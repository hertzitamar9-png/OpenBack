# Render deployment for OpenBack.
# Deploys the Dockerfile (nginx + node game server via supervisord) and a
# managed PostgreSQL instance. The server reads DATABASE_URL, DOMAIN and
# API_KEY from the environment below.

services:
  - type: web
    name: openback
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # Render injects $PORT; the Dockerfile makes nginx listen on it.
    healthCheckPath: /
    envVars:
      - key: DOMAIN
        sync: false
        # Set this to your actual Render URL after the first deploy, e.g.
        # openback-xxxx.onrender.com (no https:// prefix).
        value: openback.onrender.com
      - key: API_KEY
        sync: false
        # IMPORTANT: replace with a strong random key before going live.
        value: CHANGE_ME_TO_A_STRONG_RANDOM_API_KEY
      - key: GAME_ENV
        value: production
      - key: NUM_WORKERS
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: openback-db
          property: connectionString
      - key: AUTH_DATA_DIR
        value: /tmp
      - key: GIT_COMMIT
        sync: false
        value: unknown

databases:
  - name: openback-db
    plan: free
    databaseName: openback
    user: openback
